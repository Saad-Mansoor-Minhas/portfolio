<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

    <div class="bg-grid"></div>

    <main class="error-page">
        <div class="error-code">404</div>
        <div class="err-msg">$ kubectl get page — Error: NotFound</div>

        <p>The page you're looking for was deleted, renamed, or never made it past the canary stage. Let's roll you back to a healthy route.</p>
        <a href="index.html" class="btn btn-primary"><i class="fas fa-rotate-left"></i> Rollback to Home</a>
    </main>

    <script src="script.js"></script>
